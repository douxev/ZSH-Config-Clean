    <tspan fill="#EBCB8B">╭─</tspan><tspan fill="#BF616A">[</tspan><tspan fill="#B48EAD">󰋜 Projects/shell-config</tspan><tspan fill="#BF616A">]</tspan><tspan fill="#5E81AC"> 󱑓 1.2s </tspan><tspan fill="#BF616A">✘ </tspan>
  </text>
  <text x="660" y="165" class="mono" text-anchor="end">
