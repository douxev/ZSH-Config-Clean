  </text>
  <text x="660" y="70" class="mono" text-anchor="end">
    <tspan fill="#EBCB8B"> main </tspan><tspan fill="#8FBCBB"> 19:42 </tspan><tspan fill="#A3BE8C">󰁹 98%</tspan>
  </text>
  <text x="20" y="95" class="mono">
