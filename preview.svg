  <circle cx="40" cy="20" r="6" fill="#EBCB8B"/>
  <circle cx="60" cy="20" r="6" fill="#A3BE8C"/>
  <text x="340" y="25" class="mono dim" text-anchor="middle" font-size="12">zsh — starship prompt</text>

  <!-- Session 1 : dans ~ -->
